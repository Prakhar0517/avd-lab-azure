trigger:
- main

pr:
- main

pool:
  name: linux-build

variables:
  - name: TF_IN_AUTOMATION
    value: "true"

stages:

- stage: Plan
  displayName: "Terraform Plan"
  jobs:
  - job: plan
    displayName: "Init + Validate + Plan"
    steps:

    - checkout: self

    - task: TerraformInstaller@1
      displayName: "Install Terraform"
      inputs:
        terraformVersion: latest

    - task: AzureCLI@2
      displayName: "Verify Azure auth"
      retryCountOnTaskFailure: 2
      inputs:
        azureSubscription: 'azure connect'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          echo "=== Verifying Azure authentication ==="
          az account show
          echo "=== Auth OK. Subscription: $(az account show --query name -o tsv) ==="

    - task: AzureCLI@2
      displayName: "Terraform init + validate + plan"
      inputs:
        azureSubscription: 'azure connect'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        addSpnToEnvironment: true
        inlineScript: |
          export ARM_CLIENT_ID="$servicePrincipalId"
          export ARM_CLIENT_SECRET="$servicePrincipalKey"
          export ARM_TENANT_ID="$tenantId"
          export ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"

          cd "AVD ALL"
          terraform init -input=false
          terraform validate
          terraform plan -input=false -no-color -out=tfplan

    - task: PublishPipelineArtifact@1
      displayName: "Publish plan artifact"
      inputs:
        targetPath: 'AVD ALL/tfplan'
        artifact: 'tfplan'

- stage: Apply
  displayName: "Terraform Apply"
  dependsOn: Plan
  condition: >
    and(
      succeeded(),
      ne(variables['Build.Reason'], 'PullRequest'),
      eq(variables['Build.SourceBranch'], 'refs/heads/main')
    )

  jobs:
  - deployment: apply
    displayName: "Apply (requires approval)"
    environment: prod-approval
    strategy:
      runOnce:
        deploy:
          steps:

          - checkout: self

          - task: TerraformInstaller@1
            displayName: "Install Terraform"
            inputs:
              terraformVersion: latest

          - task: DownloadPipelineArtifact@2
            displayName: "Download plan artifact"
            inputs:
              artifact: 'tfplan'
              path: 'AVD ALL'

          - task: AzureCLI@2
            displayName: "Verify Azure auth"
            retryCountOnTaskFailure: 2
            inputs:
              azureSubscription: 'azure connect'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                echo "=== Verifying Azure auth before apply ==="
                az account show

          - task: AzureCLI@2
            displayName: "Terraform init + apply"
            inputs:
              azureSubscription: 'azure connect'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              addSpnToEnvironment: true
              inlineScript: |
                export ARM_CLIENT_ID="$servicePrincipalId"
                export ARM_CLIENT_SECRET="$servicePrincipalKey"
                export ARM_TENANT_ID="$tenantId"
                export ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"

                cd "AVD ALL"
                terraform init -input=false
                terraform apply -input=false -no-color tfplan
