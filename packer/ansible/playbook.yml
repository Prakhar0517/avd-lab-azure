---
# ─────────────────────────────────────────────────────────────────────────────
# PHASE 2b — GOLDEN IMAGE CONFIGURATION (runs inside the temporary Packer
# build VM, over WinRM — see build { provisioner "ansible" } in
# ../windows-avd.pkr.hcl)
# ─────────────────────────────────────────────────────────────────────────────
# Scope, deliberately narrow:
#   1. Install + enable the FSLogix Apps agent — VHDLocations is intentionally
#      left UNSET. The FSLogix storage account name is generated by Terraform
#      with a random suffix (Fslogix.tf) and can be recreated, so baking it
#      into the image would tie a specific storage account to every image
#      version forever. That value gets injected at VM deploy time instead
#      (follow-up Terraform task, not this playbook).
#   2. A conservative hardening baseline: disable SMBv1, disable the built-in
#      Guest account, confirm Defender real-time protection is on.
#   3. Nothing else. RDP, WinRM, the AVD agent, and Entra-join are out of
#      scope here — do not add tasks that touch them in this file.
#
# Every task below is idempotent (checks current state before changing it),
# since image builds may be re-run against the same template.
# ─────────────────────────────────────────────────────────────────────────────

- name: Configure AVD golden image (FSLogix agent + hardening baseline)
  hosts: all
  gather_facts: false

  vars:
    fslogix_download_url: https://aka.ms/fslogix_download
    fslogix_temp_dir: C:\Temp\FSLogix
    fslogix_zip_path: C:\Temp\FSLogix\FSLogixAppsSetup.zip
    fslogix_extract_dir: C:\Temp\FSLogix\Extracted
    fslogix_installer_path: C:\Temp\FSLogix\Extracted\x64\Release\FSLogixAppsSetup.exe

  tasks:
    # ── FSLogix Apps agent ────────────────────────────────────────────────
    - name: Ensure FSLogix staging directory exists
      ansible.windows.win_file:
        path: "{{ fslogix_temp_dir }}"
        state: directory

    - name: Download FSLogix agent (evergreen link — always resolves to latest)
      ansible.windows.win_get_url:
        url: "{{ fslogix_download_url }}"
        dest: "{{ fslogix_zip_path }}"
        force: false # skip re-download if already staged from a prior run

    - name: Extract FSLogix installer package
      ansible.windows.win_shell: >
        Expand-Archive -Path '{{ fslogix_zip_path }}'
        -DestinationPath '{{ fslogix_extract_dir }}' -Force
      args:
        creates: "{{ fslogix_installer_path }}"

    # creates_service (rather than product_id) avoids hardcoding a version-
    # specific MSI product GUID that would go stale every time the evergreen
    # link picks up a new FSLogix release — frxsvc existing is sufficient
    # proof the agent is already installed.
    - name: Install FSLogix Apps agent (silent)
      ansible.windows.win_package:
        path: "{{ fslogix_installer_path }}"
        arguments: /install /quiet /norestart
        creates_service: frxsvc
        state: present

    - name: Enable and start the FSLogix Apps service (frxsvc)
      ansible.windows.win_service:
        name: frxsvc
        start_mode: auto
        state: started

    # Deliberately not configuring VHDLocations or any other FSLogix registry
    # key here — see header note. That happens at VM deploy time, not bake time.

    # ── Hardening baseline ────────────────────────────────────────────────
    # SMBv1 disabled via registry (server + client redirector) rather than
    # removing the SMB1Protocol optional feature: takes effect without
    # depending on the feature-removal reboot semantics, and is the baseline
    # Microsoft documents for turning SMBv1 off.
    - name: Disable SMBv1 server protocol
      ansible.windows.win_regedit:
        path: HKLM:\SYSTEM\CurrentControlSet\Services\LanmanServer\Parameters
        name: SMB1
        data: 0
        type: dword
        state: present

    - name: Disable SMBv1 client driver (mrxsmb10)
      ansible.windows.win_regedit:
        path: HKLM:\SYSTEM\CurrentControlSet\Services\mrxsmb10
        name: Start
        data: 4
        type: dword
        state: present

    - name: Disable the built-in Guest account
      ansible.windows.win_user:
        name: Guest
        state: present
        account_disabled: true

    - name: Check Windows Defender real-time protection status
      ansible.windows.win_shell: (Get-MpComputerStatus).RealTimeProtectionEnabled
      register: defender_rtp_status
      changed_when: false

    - name: Confirm Windows Defender real-time protection is enabled
      ansible.windows.win_shell: Set-MpPreference -DisableRealtimeMonitoring $false
      when: defender_rtp_status.stdout | trim != 'True'

    # ── Cleanup ────────────────────────────────────────────────────────────
    # Runs after the FSLogix service is confirmed started — the extracted
    # installer/zip served their purpose and shouldn't be captured into the
    # sysprep'd golden image.
    - name: Remove FSLogix staging folder
      ansible.windows.win_file:
        path: "{{ fslogix_temp_dir }}"
        state: absent
